name: Fetch All Jobs

on:
  workflow_dispatch:  # Triggered by job-board-cron-worker (Cloudflare) every 15 min
  push:
    branches: [ main ]
    paths:
      - '.github/scripts/**'

# Prevent concurrent runs
concurrency:
  group: job-fetch
  cancel-in-progress: false

jobs:
  fetch-all:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}
        fetch-depth: 0  # Full history for proper rebasing
        submodules: recursive
        token: ${{ secrets.GH_PAT }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm ci

    - name: Create logs directory
      run: mkdir -p .github/logs .github/data

    - name: Seed all_jobs.json from jobs-data-2026
      run: |
        echo "📥 Seeding previous all_jobs.json from jobs-data-2026..."
        curl -sf "https://raw.githubusercontent.com/zapplyjobs/jobs-data-2026/main/.github/data/all_jobs.json?t=$(date +%s)" \
          -o .github/data/all_jobs.json && \
          echo "✅ Seeded $(wc -l < .github/data/all_jobs.json) jobs from jobs-data-2026" || \
          echo "⚠️ Could not seed all_jobs.json — starting fresh"

    - name: Seed descriptions.jsonl from jobs-data-2026
      run: |
        echo "📥 Seeding Workday description cache from jobs-data-2026..."
        # Seed from descriptions-workday.jsonl (the published sidecar) into descriptions.jsonl
        # (the local Workday fetch cache read by workday-descriptions.js Step 1b).
        # descriptions.jsonl is never pushed to jobs-data-2026 — seeding from it never worked.
        # Without this seed, Step 1b starts from 0 cached IDs every run and never accumulates.
        curl -sf "https://raw.githubusercontent.com/zapplyjobs/jobs-data-2026/main/.github/data/descriptions-workday.jsonl?t=$(date +%s)" \
          -o .github/data/descriptions.jsonl && \
          echo "✅ Seeded $(wc -l < .github/data/descriptions.jsonl) Workday descriptions from cache" || \
          echo "⚠️ No descriptions-workday.jsonl yet — starting fresh"

    - name: Seed descriptions-jsearch.jsonl from jobs-data-2026
      run: |
        echo "📥 Seeding JSearch description cache from jobs-data-2026..."
        # Seed prior descriptions-jsearch.jsonl so the accumulator in Step 8b can merge
        # existing-pool descriptions. Without this, descriptions-jsearch.jsonl doesn't exist
        # on the runner at start of each run and the legacy map is always empty.
        curl -sf "https://raw.githubusercontent.com/zapplyjobs/jobs-data-2026/main/.github/data/descriptions-jsearch.jsonl?t=$(date +%s)" \
          -o .github/data/descriptions-jsearch.jsonl && \
          echo "✅ Seeded $(wc -l < .github/data/descriptions-jsearch.jsonl) JSearch descriptions from cache" || \
          echo "⚠️ No descriptions-jsearch.jsonl yet — starting fresh"

    - name: Fetch jobs from all sources
      run: node .github/scripts/index.js 2>&1 | tee .github/logs/fetch.log
      env:
        JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}

    - name: Post-deploy invariant checks
      run: |
        echo "🔍 Running post-deploy invariant checks..."
        PASS=true

        # 1. all_jobs.json exists and has >20,000 lines
        if [ ! -f ".github/data/all_jobs.json" ]; then
          echo "❌ all_jobs.json missing"
          PASS=false
        else
          LINE_COUNT=$(wc -l < .github/data/all_jobs.json)
          if [ "$LINE_COUNT" -lt 20000 ]; then
            echo "❌ all_jobs.json: $LINE_COUNT lines (expected >20000)"
            PASS=false
          else
            echo "✅ all_jobs.json: $LINE_COUNT lines"
          fi
        fi

        # 2. tags object present on a sample of records
        TAGGED=$(head -5 .github/data/all_jobs.json | python3 -c "
        import sys, json
        ok = sum(1 for l in sys.stdin if l.strip() and 'tags' in json.loads(l))
        print(ok)
        " 2>/dev/null || echo 0)
        if [ "$TAGGED" -lt 5 ]; then
          echo "❌ tags field missing on sampled records ($TAGGED/5 have it)"
          PASS=false
        else
          echo "✅ tags field present on sampled records"
        fi

        # 3. source field present on records
        SOURCED=$(head -5 .github/data/all_jobs.json | python3 -c "
        import sys, json
        ok = sum(1 for l in sys.stdin if l.strip() and json.loads(l).get('source'))
        print(ok)
        " 2>/dev/null || echo 0)
        if [ "$SOURCED" -lt 5 ]; then
          echo "❌ source field missing on sampled records ($SOURCED/5 have it)"
          PASS=false
        else
          echo "✅ source field present on sampled records"
        fi

        # 4. is_direct_apply field present on at least one JSearch record
        JSEARCH_WITH_FLAG=$(python3 -c "
        import json
        count = 0
        with open('.github/data/all_jobs.json') as f:
          for line in f:
            line = line.strip()
            if not line: continue
            j = json.loads(line)
            if j.get('source') == 'jsearch' and 'is_direct_apply' in j:
              count += 1
              if count >= 1: break
        print(count)
        " 2>/dev/null || echo 0)
        if [ "$JSEARCH_WITH_FLAG" -lt 1 ]; then
          echo "⚠️  is_direct_apply field not yet on JSearch records (may appear after TTL refresh)"
        else
          echo "✅ is_direct_apply present on JSearch records"
        fi

        # 5. jobs-metadata.json has freshness and top_companies (new fields from df7e6a4)
        if [ -f ".github/data/jobs-metadata.json" ]; then
          HAS_FRESHNESS=$(python3 -c "
        import json
        m = json.load(open('.github/data/jobs-metadata.json'))
        print(1 if 'freshness' in m and 'top_companies' in m else 0)
        " 2>/dev/null || echo 0)
          if [ "$HAS_FRESHNESS" -eq 1 ]; then
            echo "✅ jobs-metadata.json has freshness + top_companies fields"
          else
            echo "❌ jobs-metadata.json missing freshness or top_companies fields"
            PASS=false
          fi
        fi

        if [ "$PASS" = "true" ]; then
          echo "✅ All invariant checks passed"
        else
          echo "❌ One or more invariant checks failed — see above"
          exit 1
        fi

    - name: Display logs (always run)
      if: always()
      run: |
        echo "📋 Fetch Output (last 50 lines):"
        tail -50 .github/logs/fetch.log || echo "Log file not found"

    - name: Verify output files
      if: always()
      run: |
        echo "📊 Output Files:"
        ls -lh .github/data/all_jobs.json || echo "all_jobs.json not found"
        ls -lh .github/data/jobs-metadata.json || echo "jobs-metadata.json not found"
        ls -lh .github/data/dedupe-store.json || echo "dedupe-store.json not found"

    - name: Display job counts
      if: always()
      run: |
        if [ -f ".github/data/jobs-metadata.json" ]; then
          echo "📊 Job Statistics:"
          cat .github/data/jobs-metadata.json | jq '{
            total_jobs,
            unique_jobs,
            duplicates_removed,
            by_job_type,
            jsearch_stats
          }'
        fi

    - name: Show git status
      if: always()
      run: |
        echo "📝 Git Status:"
        git status

    - name: Show git diff (if changes)
      if: always()
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "📝 Git Diff:"
          git diff --stat
        fi

    - name: 🔄 Pull latest changes (before push)
      if: always()
      run: |
        echo "📥 Pulling latest changes..."
        # descriptions.jsonl is Workday fetch cache — modified each run but not staged.
        # Discard unstaged changes so git pull --rebase can proceed.
        git restore .github/data/descriptions.jsonl 2>/dev/null || true
        git fetch origin ${{ github.ref_name }}
        # Use rebase instead of reset to preserve local commits
        if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/${{ github.ref_name }})" ]; then
          git pull origin ${{ github.ref_name }} --rebase || echo "No divergent commits to rebase"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push changes
      if: always()
      run: |
        if [ -n "$(git status --porcelain)" ] || [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/${{ github.ref_name }})" ]; then
          echo "📤 Pushing changes to origin..."
          git push origin ${{ github.ref_name }}
        else
          echo "ℹ️ No changes to push"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push all_jobs.json to jobs-data-2026
      if: success()
      run: |
        echo "📤 Pushing all_jobs.json to jobs-data-2026..."

        # Clone jobs-data-2026 into a temp directory
        git clone "https://x-access-token:${GH_PAT}@github.com/zapplyjobs/jobs-data-2026.git" /tmp/jobs-data-2026

        # Copy all_jobs.json, jobs-metadata.json, descriptions.jsonl, and per-source sidecars.
        # Remove existing sidecar files in the clone first so stale chunks don't persist
        # (e.g. descriptions-workday.jsonl orphaned when descriptions-workday-1.jsonl takes over).
        cp .github/data/all_jobs.json /tmp/jobs-data-2026/.github/data/all_jobs.json
        cp .github/data/jobs-metadata.json /tmp/jobs-data-2026/.github/data/jobs-metadata.json
        if [ -f ".github/data/descriptions.jsonl" ]; then
          cp .github/data/descriptions.jsonl /tmp/jobs-data-2026/.github/data/descriptions.jsonl
        fi
        # Delete all existing per-source sidecars in the clone, then copy the current set.
        # This ensures files removed by the aggregator's stale-file cleanup are also removed here.
        rm -f /tmp/jobs-data-2026/.github/data/descriptions-*.jsonl
        for f in .github/data/descriptions-*.jsonl; do
          [ -f "$f" ] && cp "$f" /tmp/jobs-data-2026/.github/data/
        done

        # Generate ZJP_SNAPSHOT.json + ZJP_CONTEXT.md and write directly into the clone.
        # Non-fatal: if this fails, job data still pushes normally.
        echo "📊 Generating ZJP snapshot..."
        node .github/scripts/generate-snapshot.js || echo "⚠️ Snapshot generation failed — continuing without it"

        # Commit and push
        cd /tmp/jobs-data-2026
        git config user.email "bot@zapplyjobs.com"
        git config user.name "Data Bot"
        git add .github/data/all_jobs.json .github/data/jobs-metadata.json
        git add .github/data/descriptions.jsonl 2>/dev/null || true
        # Stage per-source sidecars: -u picks up deletions of tracked files (stale chunks),
        # then the glob add picks up any new files not yet tracked.
        git add -u .github/data/ 2>/dev/null || true
        git add .github/data/descriptions-*.jsonl 2>/dev/null || true
        git add .github/data/ZJP_SNAPSHOT.json .github/data/ZJP_CONTEXT.md 2>/dev/null || true

        if [ -n "$(git status --porcelain)" ]; then
          JOB_COUNT=$(wc -l < .github/data/all_jobs.json)
          git commit -m "Update jobs - $(date -u +%Y-%m-%d %H:%M UTC) - ${JOB_COUNT} jobs"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "✅ Pushed ${JOB_COUNT} jobs to jobs-data-2026"
        else
          echo "ℹ️ No changes to push (all_jobs.json unchanged)"
        fi
      env:
        GH_PAT: ${{ secrets.GH_PAT }}

    - name: Generate dependency diagram (if submodule changed)
      if: success()
      run: |
        # Only regenerate if submodule hash changed since last diagram was generated.
        CURRENT_HASH=$(git -C .github/scripts/shared rev-parse HEAD 2>/dev/null | cut -c1-7 || echo "unknown")
        PREV_HASH=$(cat /tmp/jobs-data-2026/.github/data/.dep-diagram-hash 2>/dev/null || echo "")
        if [ "$CURRENT_HASH" = "$PREV_HASH" ]; then
          echo "ℹ️ Submodule unchanged ($CURRENT_HASH) — skipping dependency diagram regeneration"
        else
          echo "🔍 Submodule changed ($PREV_HASH → $CURRENT_HASH) — regenerating dependency diagram..."
          cd .github/scripts/shared
          npx --yes dependency-cruiser@^16 \
            --no-config \
            --output-type mermaid \
            --exclude "node_modules" \
            --do-not-follow "node_modules" \
            --max-depth 6 \
            index.js lib/aggregator/processors/tag-engine.js \
            > /tmp/dep-graph-raw.md 2>/dev/null || true
          if [ -s /tmp/dep-graph-raw.md ]; then
            echo "# ZJP Dependency Graph" > /tmp/jobs-data-2026/.github/data/ZJP_DEPENDENCY_GRAPH.md
            echo "" >> /tmp/jobs-data-2026/.github/data/ZJP_DEPENDENCY_GRAPH.md
            echo "Generated from submodule \`$CURRENT_HASH\`. Entry points: \`index.js\`, \`lib/aggregator/processors/tag-engine.js\`." >> /tmp/jobs-data-2026/.github/data/ZJP_DEPENDENCY_GRAPH.md
            echo "" >> /tmp/jobs-data-2026/.github/data/ZJP_DEPENDENCY_GRAPH.md
            cat /tmp/dep-graph-raw.md >> /tmp/jobs-data-2026/.github/data/ZJP_DEPENDENCY_GRAPH.md
            echo "$CURRENT_HASH" > /tmp/jobs-data-2026/.github/data/.dep-diagram-hash
            echo "✅ Dependency diagram written"
            cd /tmp/jobs-data-2026
            git add .github/data/ZJP_DEPENDENCY_GRAPH.md .github/data/.dep-diagram-hash 2>/dev/null || true
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "chore: regenerate dependency diagram for submodule $CURRENT_HASH"
              git push origin main || echo "⚠️ Push failed — diagram will be included in next run"
            fi
          else
            echo "⚠️ dependency-cruiser produced no output — skipping"
          fi
        fi

    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Workflow failed - check logs above"
        echo "Last 30 lines of fetch log:"
        tail -30 .github/logs/fetch.log || echo "No log file"
